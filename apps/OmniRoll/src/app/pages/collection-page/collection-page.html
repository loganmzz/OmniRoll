<p-dataview [value]="games()" [trackBy]="game => game.key" layout="grid">
  <ng-template #grid let-items>
    <div class="grid">
      @for (game of items; track game.key) {
      <p-card
        tabindex="0"
        role="checkbox"
        [aria-checked]="game.enabled"
        class="link"
        [class.selected]="game.enabled"
        [class.unselected]="!game.enabled"
        (keyup)="reverse(game)"
        (click)="reverse(game)">
          <div>
            <span class="pi" [class.pi-check]="game.enabled" [class.pi-ban]="!game.enabled"></span>
            {{ game.name }}
          </div>
      </p-card>
      }
    </div>
  </ng-template>
</p-dataview>
