<p-button [routerLink]="['collection']" label="✏️"></p-button>

@let games = collection.games();
<p-dataview [value]="games" [trackBy]="game => game.key" layout="grid">
  <ng-template #grid let-items>
    <div class="grid">
      @for (game of items; track game.key) {
        <p-card class="link" [routerLink]="['game', game.key]">
          <div>{{ game.name }}</div>
        </p-card>
      }
    </div>
  </ng-template>
  <ng-template #emptymessage>
    <p>No game available! <a routerLink="/collection">Update your game collection?</a></p>
  </ng-template>
</p-dataview>
